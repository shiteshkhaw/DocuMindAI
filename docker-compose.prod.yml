version: "3.8"

# ============================================================
# DocuMind AI - Production Docker Compose
# ============================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Inject secrets via environment variables or .env file.
# ============================================================

services:

  # ── Frontend (Next.js / Vercel-equivalent local) ───────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: documind-web:latest
    container_name: documind-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8000}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - documind-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API (FastAPI / Uvicorn) ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: documind-api:latest
    container_name: documind-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - VECTOR_STORE_PROVIDER=${VECTOR_STORE_PROVIDER:-chroma}
      - CHROMA_SERVER_HOST=chroma
      - CHROMA_SERVER_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:-redis://redis:6379/0}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-documind-vault}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_PROFILES_SAMPLE_RATE=${SENTRY_PROFILES_SAMPLE_RATE:-0.1}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - DRAMATIQ_BROKER_URL=${DRAMATIQ_BROKER_URL:-redis://redis:6379/1}
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - documind-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Dramatiq Worker (Background Ingestion + Email) ─────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: documind-worker:latest
    container_name: documind-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - VECTOR_STORE_PROVIDER=${VECTOR_STORE_PROVIDER:-chroma}
      - CHROMA_SERVER_HOST=chroma
      - CHROMA_SERVER_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:-redis://redis:6379/0}
      - DRAMATIQ_BROKER_URL=${DRAMATIQ_BROKER_URL:-redis://redis:6379/1}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-documind-vault}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - documind-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Redis (Rate Limiter + Cache + Dramatiq Broker) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: documind-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - documind-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── ChromaDB (Vector Store) ────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: documind-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_API_KEY}
    volumes:
      - chroma_data:/chroma/chroma
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - documind-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local

networks:
  documind-net:
    driver: bridge
